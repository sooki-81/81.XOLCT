          <!-- Инпут -->
          <div class="import-input-row">
            <input
              class="import-input"
              id="url-input"
              type="url"
              placeholder="Ссылка на объект"
              autocomplete="off"
              spellcheck="false"

            <polyline points="5,9.5 7.5,12 13,6.5" stroke="#1FDB7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
