name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Diagnose signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $k = $env:TAURI_SIGNING_PRIVATE_KEY
          if ([string]::IsNullOrEmpty($k)) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY (secret not set or empty value)"
          } else {
            $len = $k.Length
            $first = $k.Substring(0, [Math]::Min(6, $len))
            $last  = if ($len -ge 8) { $k.Substring($len - 8) } else { $k }
            Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $len (expected ~348)"
            Write-Host "First chars: $first..."
            Write-Host "Last chars:  ...$last"
          }

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build

      - name: List bundle artifacts
        shell: pwsh
        run: |
          Write-Host "=== Содержимое src-tauri/target/release/bundle ==="
          Get-ChildItem -Recurse "src-tauri/target/release/bundle" -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Format-Table -AutoSize
          Write-Host ""
          Write-Host "=== Tauri CLI version ==="
          npm exec --no -- tauri --version

      - name: Generate latest.json
        shell: pwsh
        run: |
          $msiDir = "src-tauri/target/release/bundle/msi"
          # Tauri 2.x подписывает .msi напрямую (XOLCT_x.y.z_x64_en-US.msi.sig),
          # а не .msi.zip.sig как было раньше.
          $sigFiles = Get-ChildItem "$msiDir" -Filter "*.msi.sig" -ErrorAction SilentlyContinue
          $msiFiles = Get-ChildItem "$msiDir" -Filter "*.msi" -ErrorAction SilentlyContinue |
                      Where-Object { $_.Name -notlike "*.sig" }
          if (-not $sigFiles -or $sigFiles.Count -eq 0) {
            Write-Warning "Файл .msi.sig не найден — проверь секрет TAURI_SIGNING_PRIVATE_KEY. latest.json не будет создан."
            exit 0
          }
          $sigFile = $sigFiles[0]
          $msiFile = $msiFiles[0]
          $sig  = (Get-Content $sigFile.FullName -Raw).Trim()
          $tag  = "${{ github.ref_name }}"
          $ver  = $tag.TrimStart('v')
          $url  = "https://github.com/sooki-81/81.XOLCT/releases/download/$tag/$($msiFile.Name)"
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $obj  = [PSCustomObject]@{
            version  = $ver
            notes    = ""
            pub_date = $date
            platforms = [PSCustomObject]@{
              "windows-x86_64" = [PSCustomObject]@{
                signature = $sig
                url       = $url
              }
            }
          }
          $obj | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding utf8NoBOM
          Write-Host "latest.json создан для $ver -> $url"

      - name: Create GitHub Release (MSI)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload update manifest
        if: hashFiles('latest.json') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
